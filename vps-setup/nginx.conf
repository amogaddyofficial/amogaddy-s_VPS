events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream vigilante  { server vigilante:8080; }
    upstream ssh_mgr    { server ssh-manager:8081; }

    # ── Redirect HTTP → HTTPS ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Server HTTPS principale ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${VPS_HOST};

        ssl_certificate     /etc/letsencrypt/live/${VPS_HOST}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${VPS_HOST}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Sicurezza headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer-when-downgrade;

        # ── API Backend vigilante ─────────────────────────────────────────
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://vigilante;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            client_max_body_size 50M;
        }

        # ── API SSH Manager ───────────────────────────────────────────────
        location /ssh/ {
            rewrite ^/ssh/(.*)$ /$1 break;
            proxy_pass         http://ssh_mgr;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Frontend Vite (build statica) ─────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache per gli asset con hash nel nome
            location ~* \.(js|css|png|svg|ico|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
